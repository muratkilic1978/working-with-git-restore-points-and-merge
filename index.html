<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS Road Animations</title>
    <!-- indsæt link her til eksternt stylesheet --> 
     <link rel="stylesheet" href="css/style.css">
</head>
<body>
<!-- opbyg HTML struktur her -->
 <section class="scene">
    <div class="sun"></div>
    <div class="bg">
        <figure>
            <img src="img/red-car.png" alt="red car" class="car1" id="redcar">
        </figure>
        <figure>
            <img src="img/car.gif" alt="police car" class="car2" id="policeCar">
        </figure>
        <figure>
            <img src="img/light-blue-car.png" alt="blue car" class="car3" id="blueCar">
        </figure>
        
    </div>
 </section>
 <div id="tooltip" class="tooltip"></div>

<!-- indsæt link her til eksternt javascript --> 
 <script src="js/animate-objects-on-road.js"></script>
</body>
</html>
